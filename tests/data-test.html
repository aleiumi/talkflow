<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TalkFlow 数据验证测试</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f; color: #e0e0e0; padding: 20px;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border-radius: 12px; padding: 20px 24px; margin-bottom: 16px;
      border: 1px solid #2a2a4a;
    }
    .header h1 { font-size: 22px; color: #fff; margin-bottom: 8px; }
    .stats { display: flex; gap: 16px; flex-wrap: wrap; }
    .stat {
      background: rgba(255,255,255,0.05); border-radius: 8px;
      padding: 8px 16px; font-size: 14px;
    }
    .stat .num { color: #4fc3f7; font-weight: 700; font-size: 18px; }
    .stat.pass .num { color: #66bb6a; }
    .stat.fail .num { color: #ef5350; }
    .filters {
      background: #1a1a1a; border-radius: 12px; padding: 16px 20px;
      margin-bottom: 16px; border: 1px solid #2a2a2a;
    }
    .filters h3 { font-size: 14px; color: #888; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
    .filter-group { margin-bottom: 12px; }
    .filter-group:last-child { margin-bottom: 0; }
    .filter-group label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
    .filter-group select {
      background: #2a2a2a; color: #e0e0e0; border: 1px solid #3a3a3a;
      border-radius: 6px; padding: 6px 12px; font-size: 14px; cursor: pointer;
    }
    .filter-group select:focus { outline: none; border-color: #4fc3f7; }
    .btn-row { display: flex; gap: 8px; margin-top: 12px; }
    .btn {
      background: #4fc3f7; color: #000; border: none; border-radius: 6px;
      padding: 6px 16px; font-size: 13px; cursor: pointer; font-weight: 600;
    }
    .btn:hover { background: #29b6f6; }
    .btn.secondary { background: #3a3a3a; color: #aaa; }
    .btn.secondary:hover { background: #4a4a4a; color: #fff; }
    .result-bar {
      background: #1a1a2e; border-radius: 8px; padding: 12px 20px;
      margin-bottom: 16px; border: 1px solid #2a2a4a;
      display: flex; justify-content: space-between; align-items: center;
    }
    .result-bar .count { font-size: 20px; font-weight: 700; color: #4fc3f7; }
    .result-bar .total { font-size: 14px; color: #666; }
    .topic-list {
      background: #1a1a1a; border-radius: 12px; padding: 16px;
      border: 1px solid #2a2a2a;
    }
    .topic-item {
      border-bottom: 1px solid #2a2a2a; padding: 12px 0;
      display: flex; gap: 12px; align-items: flex-start;
    }
    .topic-item:last-child { border-bottom: none; }
    .topic-id {
      background: #4fc3f7; color: #000; border-radius: 6px;
      padding: 2px 8px; font-size: 12px; font-weight: 700;
      white-space: nowrap; min-width: 32px; text-align: center;
    }
    .topic-content { flex: 1; }
    .topic-content .topic-text { font-size: 14px; color: #e0e0e0; margin-bottom: 4px; }
    .topic-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag {
      font-size: 11px; padding: 2px 8px; border-radius: 4px;
    }
    .tag.scene { background: #1b5e20; color: #a5d6a7; }
    .tag.rel { background: #4a148c; color: #ce93d8; }
    .tag.mood { background: #e65100; color: #ffcc80; }
    .error-list {
      background: #2a0a0a; border-radius: 12px; padding: 16px;
      margin-top: 16px; border: 1px solid #4a1a1a; display: none;
    }
    .error-list.visible { display: block; }
    .error-list h3 { color: #ef5350; font-size: 14px; margin-bottom: 10px; }
    .error-item { font-size: 13px; color: #ef9a9a; padding: 4px 0; }
    .empty-state { text-align: center; padding: 40px; color: #666; font-size: 14px; }
    .loading { text-align: center; padding: 40px; color: #4fc3f7; }
  </style>
</head>
<body>
  <div class="header">
    <h1>TalkFlow 数据验证测试</h1>
    <div class="stats" id="stats"></div>
  </div>

  <div class="filters">
    <h3>筛选</h3>
    <div class="filter-group">
      <label>场景</label>
      <select id="filterScene"><option value="">全部场景</option></select>
    </div>
    <div class="filter-group">
      <label>关系阶段</label>
      <select id="filterRel"><option value="">全部关系</option></select>
    </div>
    <div class="filter-group">
      <label>情绪风格</label>
      <select id="filterMood"><option value="">全部风格</option></select>
    </div>
    <div class="btn-row">
      <button class="btn" onclick="applyFilters()">应用筛选</button>
      <button class="btn secondary" onclick="resetFilters()">重置</button>
      <button class="btn secondary" onclick="runValidation()">重新校验</button>
    </div>
  </div>

  <div class="result-bar">
    <span>显示 <span class="count" id="count">0</span> / <span class="total" id="total">0</span> 个话题</span>
  </div>

  <div class="topic-list" id="topicList">
    <div class="loading">加载中...</div>
  </div>

  <div class="error-list" id="errorList">
    <h3>⚠ 数据校验错误</h3>
    <div id="errorItems"></div>
  </div>

  <script>
    const VALID_SCENE = ['微信聊天', '面对面吃饭', '散步中', '深夜电话'];
    const VALID_REL = ['刚加好友', '初次约会', '暧昧期', '稳定期', '见家长'];
    const VALID_MOOD = ['幽默风趣', '治愈感性', '深度思考', '奇思妙想'];
    const REQUIRED_FIELDS = ['id', 'topic', 'scene', 'relationship', 'mood', 'opening', 'psychology', 'followUp'];
    const TOPICS_URL = '../data/topics.json';

    let allTopics = [];
    let filteredTopics = [];
    let errors = [];

    async function loadTopics() {
      try {
        const resp = await fetch(TOPICS_URL);
        if (!resp.ok) throw new Error('无法加载 ' + TOPICS_URL + '，请确保在 Vite 开发服务器上运行 (localhost:3000)');
        const data = await resp.json();
        allTopics = data.topics || [];
        return true;
      } catch (e) {
        renderError(e.message);
        return false;
      }
    }

    function validateData(topics) {
      errors = [];
      const idSet = new Set();
      for (const t of topics) {
        for (const f of REQUIRED_FIELDS) {
          if (t[f] === undefined || t[f] === null) {
            errors.push('ID ' + t.id + ': 缺少字段 ' + f);
          }
        }
        if (!VALID_SCENE.includes(t.scene)) errors.push('ID ' + t.id + ': 无效场景 "' + t.scene + '"');
        if (!VALID_REL.includes(t.relationship)) errors.push('ID ' + t.id + ': 无效关系 "' + t.relationship + '"');
        if (!VALID_MOOD.includes(t.mood)) errors.push('ID ' + t.id + ': 无效情绪 "' + t.mood + '"');
        if (!Array.isArray(t.followUp) || t.followUp.length < 2) {
          errors.push('ID ' + t.id + ': followUp 只有 ' + ((t.followUp || []).length) + ' 个分支 (需要 ≥2)');
        }
        if (Array.isArray(t.followUp)) {
          for (let i = 0; i < t.followUp.length; i++) {
            if (!t.followUp[i].when || !t.followUp[i].response) {
              errors.push('ID ' + t.id + ': followUp[' + i + '] 缺少 when/response');
            }
          }
        }
        if (idSet.has(t.id)) errors.push('ID ' + t.id + ': ID 重复');
        idSet.add(t.id);
      }
      const ids = topics.map(t => t.id).sort((a, b) => a - b);
      for (let i = 0; i < ids.length; i++) {
        if (ids[i] !== i + 1) {
          errors.push('ID 不连续: 位置 ' + (i + 1) + ' 期望 ' + (i + 1) + ' 得到 ' + ids[i]);
        }
      }
      return errors.length === 0;
    }

    function populateFilters(topics) {
      const scenes = [...new Set(topics.map(t => t.scene))].sort();
      const rels = [...new Set(topics.map(t => t.relationship))].sort();
      const moods = [...new Set(topics.map(t => t.mood))].sort();

      fillSelect('filterScene', scenes, '');
      fillSelect('filterRel', rels, '');
      fillSelect('filterMood', moods, '');
    }

    function fillSelect(id, values, defaultLabel) {
      const sel = document.getElementById(id);
      sel.innerHTML = '<option value="">全部</option>';
      values.forEach(v => {
        const opt = document.createElement('option');
        opt.value = v; opt.textContent = v;
        sel.appendChild(opt);
      });
    }

    function applyFilters() {
      const scene = document.getElementById('filterScene').value;
      const rel = document.getElementById('filterRel').value;
      const mood = document.getElementById('filterMood').value;
      filteredTopics = allTopics.filter(t => {
        if (scene && t.scene !== scene) return false;
        if (rel && t.relationship !== rel) return false;
        if (mood && t.mood !== mood) return false;
        return true;
      });
      renderList();
    }

    function resetFilters() {
      document.getElementById('filterScene').value = '';
      document.getElementById('filterRel').value = '';
      document.getElementById('filterMood').value = '';
      filteredTopics = [...allTopics];
      renderList();
    }

    function renderStats() {
      const scenes = {}, rels = {}, moods = {};
      allTopics.forEach(t => { scenes[t.scene] = (scenes[t.scene] || 0) + 1; rels[t.relationship] = (rels[t.relationship] || 0) + 1; moods[t.mood] = (moods[t.mood] || 0) + 1; });
      const valid = errors.length === 0;
      document.getElementById('stats').innerHTML =
        '<div class="stat"><div class="num">' + allTopics.length + '</div>总话题</div>' +
        '<div class="stat ' + (valid ? 'pass' : 'fail') + '"><div class="num">' + (valid ? '✓' : '✗ ' + errors.length + ' 错误') + '</div>校验结果</div>' +
        '<div class="stat"><div class="num">' + Object.keys(scenes).length + '</div>场景</div>' +
        '<div class="stat"><div class="num">' + Object.keys(rels).length + '</div>关系</div>' +
        '<div class="stat"><div class="num">' + Object.keys(moods).length + '</div>风格</div>';
    }

    function renderList() {
      const list = document.getElementById('topicList');
      document.getElementById('count').textContent = filteredTopics.length;
      document.getElementById('total').textContent = allTopics.length;

      if (filteredTopics.length === 0) {
        list.innerHTML = '<div class="empty-state">没有找到匹配的话题</div>';
        return;
      }

      let html = '';
      filteredTopics.forEach(t => {
        html += '<div class="topic-item">' +
          '<div class="topic-id">' + t.id + '</div>' +
          '<div class="topic-content">' +
          '<div class="topic-text">' + escapeHtml(t.topic) + '</div>' +
          '<div class="topic-tags">' +
          '<span class="tag scene">' + escapeHtml(t.scene) + '</span>' +
          '<span class="tag rel">' + escapeHtml(t.relationship) + '</span>' +
          '<span class="tag mood">' + escapeHtml(t.mood) + '</span>' +
          '</div></div></div>';
      });
      list.innerHTML = html;
    }

    function renderErrors() {
      const el = document.getElementById('errorList');
      const items = document.getElementById('errorItems');
      if (errors.length === 0) {
        el.classList.remove('visible');
        return;
      }
      el.classList.add('visible');
      items.innerHTML = errors.map(e => '<div class="error-item">• ' + escapeHtml(e) + '</div>').join('');
    }

    function renderError(msg) {
      document.getElementById('topicList').innerHTML = '<div class="empty-state" style="color:#ef5350">⚠ ' + escapeHtml(msg) + '</div>';
      document.getElementById('stats').innerHTML = '<div class="stat fail"><div class="num">加载失败</div>数据</div>';
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function runValidation() {
      if (allTopics.length === 0) {
        await loadTopics();
      }
      validateData(allTopics);
      renderStats();
      renderErrors();
    }

    async function init() {
      const ok = await loadTopics();
      if (!ok) return;
      populateFilters(allTopics);
      filteredTopics = [...allTopics];
      validateData(allTopics);
      renderStats();
      renderErrors();
      renderList();
    }

    init();
  </script>
</body>
</html>
